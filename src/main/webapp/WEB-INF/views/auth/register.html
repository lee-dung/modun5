<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng ký - Expense App</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/static/css/main.css}">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-brand-panel">
    <div class="brand-content">
      <a href="#" class="brand-logo">
        <span class="brand-logo-icon">💰</span>
        Expense App
      </a>
      <h1 class="brand-headline">
        Bắt đầu<br>hành trình<br><span>quản lý tiền</span>
      </h1>
      <p class="brand-desc">
        Tạo tài khoản miễn phí và kiểm soát toàn bộ thu chi của bạn chỉ trong vài phút.
      </p>
      <ul class="brand-features">
        <li>Hoàn toàn miễn phí</li>
        <li>Dữ liệu bảo mật, mã hóa</li>
        <li>Dễ dùng, không cần kỹ thuật</li>
        <li>Hỗ trợ nhiều ví và danh mục</li>
      </ul>
    </div>
  </div>
  <div class="auth-form-panel">
    <div class="auth-form-box">

      <h2 class="auth-form-title">Tạo tài khoản</h2>
      <p class="auth-form-subtitle">
        Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a>
      </p>

      <div th:if="${errorMsg}" class="alert-app alert-error">
        <i class="bi bi-exclamation-circle alert-icon"></i>
        <span th:text="${errorMsg}"></span>
      </div>
      <form th:action="@{/register}" method="post" th:object="${registerDTO}" novalidate>

        <div class="form-group">
          <label class="form-label" for="fullName">Họ và tên</label>
          <div class="input-wrapper">
            <i class="bi bi-person-circle input-icon"></i>
            <input type="text" class="form-control"
                   th:field="*{fullName}"
                   th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                   id="fullName" placeholder="Nguyễn Văn A" autocomplete="name">
          </div>
          <div class="field-error" th:if="${#fields.hasErrors('fullName')}">
            <i class="bi bi-exclamation-circle"></i>
            <span th:errors="*{fullName}"></span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="username">Tên đăng nhập</label>
          <div class="input-wrapper">
            <i class="bi bi-at input-icon"></i>
            <input type="text" class="form-control"
                   th:field="*{username}"
                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                   id="username" placeholder="vd: nguyenvana" autocomplete="username">
          </div>
          <div class="field-error" th:if="${#fields.hasErrors('username')}">
            <i class="bi bi-exclamation-circle"></i>
            <span th:errors="*{username}"></span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <div class="input-wrapper">
            <i class="bi bi-envelope input-icon"></i>
            <input type="email" class="form-control"
                   th:field="*{email}"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                   id="email" placeholder="email@example.com" autocomplete="email">
          </div>
          <div class="field-error" th:if="${#fields.hasErrors('email')}">
            <i class="bi bi-exclamation-circle"></i>
            <span th:errors="*{email}"></span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Mật khẩu</label>
          <div class="input-wrapper">
            <i class="bi bi-lock input-icon"></i>
            <input type="password" class="form-control"
                   th:field="*{password}"
                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                   id="password" placeholder="Tối thiểu 6 ký tự" autocomplete="new-password">
            <button type="button" class="btn-toggle-pass" aria-label="Hiện ẩn mật khẩu">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div class="strength-wrap">
            <div class="strength-bar-track">
              <div class="strength-bar" id="strengthBar"></div>
            </div>
            <div class="strength-text" id="strengthText"></div>
          </div>
          <div class="field-error" th:if="${#fields.hasErrors('password')}">
            <i class="bi bi-exclamation-circle"></i>
            <span th:errors="*{password}"></span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Xác nhận mật khẩu</label>
          <div class="input-wrapper">
            <i class="bi bi-lock-fill input-icon"></i>
            <input type="password" class="form-control"
                   th:field="*{confirmPassword}"
                   th:classappend="${passwordError != null} ? 'is-invalid'"
                   id="confirmPassword" placeholder="Nhập lại mật khẩu" autocomplete="new-password">
            <button type="button" class="btn-toggle-pass" aria-label="Hiện ẩn mật khẩu">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div class="strength-text" id="matchMsg" style="margin-top:.3rem;"></div>
          <div class="field-error" th:if="${passwordError != null}">
            <i class="bi bi-exclamation-circle"></i>
            <span th:text="${passwordError}"></span>
          </div>
        </div>
        <div class="check-group" style="margin-top:.25rem;">
          <input type="checkbox" id="terms" required>
          <label for="terms">
            Tôi đồng ý với <a href="#">Điều khoản sử dụng</a> và <a href="#">Chính sách bảo mật</a>
          </label>
        </div>

        <button type="submit" class="btn-submit">
          <span class="spinner"></span>
          <span class="btn-text">Tạo tài khoản &nbsp;<i class="bi bi-arrow-right"></i></span>
        </button>

      </form>
    </div>
  </div>

</div>
<script th:src="@{/static/js/app.js}"></script>
</body>
</html>
